<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reef &amp; Tide — Lake Erie Fishing Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(126,196,207,0.08), transparent 60%),
      radial-gradient(1000px 500px at -10% 100%, rgba(60,90,170,0.18), transparent 60%),
      linear-gradient(180deg, #060e1c 0%, #02080f 100%);
    background-attachment: fixed;
    color: #f0f4f8;
    font-family: 'Bitter', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        180deg,
        rgba(255,255,255,0.012) 0px,
        rgba(255,255,255,0.012) 1px,
        transparent 1px,
        transparent 3px
      );
    z-index: 1;
  }
  #root {
    position: relative;
    z-index: 2;
  }
  ::selection { background: rgba(126,196,207,0.35); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: rgba(8,18,34,0.6); }
  ::-webkit-scrollbar-thumb { background: rgba(126,196,207,0.25); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(126,196,207,0.5); }

  /* Native select option styling (best effort — browsers differ) */
  select option, select optgroup {
    background: #0a1626;
    color: #f0f4f8;
    font-family: 'Share Tech Mono', monospace;
  }
  select optgroup {
    color: #7ec4cf;
    font-style: normal;
    font-weight: 700;
  }

  input:focus, select:focus, button:focus {
    border-color: rgba(126,196,207,0.7) !important;
    box-shadow: 0 0 0 2px rgba(126,196,207,0.15);
  }
  button:hover { filter: brightness(1.15); }

  @keyframes pulseLive {
    0%   { transform: scale(1);   opacity: 0.7; }
    70%  { transform: scale(2.6); opacity: 0;   }
    100% { transform: scale(2.6); opacity: 0;   }
  }

  a { color: #7ec4cf; }
  a:hover { color: #a8d1d8; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="intelligence.js"></script>
<script src="astro.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
